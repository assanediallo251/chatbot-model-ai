services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: chatbot_isi
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d chatbot_isi"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    environment:
      APP_ENV: local
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/chatbot_isi
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_MODEL: ${GROQ_MODEL:-openai/gpt-oss-20b}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-hashing}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-384}
      EMBEDDING_BATCH_SIZE: ${EMBEDDING_BATCH_SIZE:-32}
      EMBEDDING_PRELOAD_ON_STARTUP: ${EMBEDDING_PRELOAD_ON_STARTUP:-false}
      CHUNK_SIZE: ${CHUNK_SIZE:-800}
      CHUNK_OVERLAP: ${CHUNK_OVERLAP:-120}
      RETRIEVAL_TOP_K: ${RETRIEVAL_TOP_K:-5}
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-20}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  streamlit:
    build: .
    command: streamlit run streamlit_app/main.py --server.address 0.0.0.0 --server.port 8501
    environment:
      API_BASE_URL: http://api:8000/api/v1
    ports:
      - "8501:8501"
    depends_on:
      - api

volumes:
  postgres-data:
